<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anymize - Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #1e1e2e;
            color: #e2e8f0;
        }
        
        .container {
            background-color: #212529;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .card {
            background-color: #2d3748;
            border-color: #4a5568;
        }
        
        .card-header {
            background-color: #2d3748;
            border-color: #4a5568;
            color: #e2e8f0;
        }
        
        .text-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #4a5568;
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #2d3748;
            color: #e2e8f0;
            width: 100%;
        }
        
        pre {
            color: #e2e8f0;
            white-space: pre-wrap;       /* CSS3 */
            white-space: -moz-pre-wrap;  /* Firefox */
            white-space: -pre-wrap;      /* Opera <7 */
            white-space: -o-pre-wrap;    /* Opera 7 */
            word-wrap: break-word;       /* IE & Chrome */
            width: 100%;
            overflow-x: hidden;
        }
        
        h1, h5 {
            color: #e2e8f0;
        }
        
        /* Button styles */
        .btn-primary {
            background-color: #3182ce;
            border-color: #2b6cb0;
        }
        
        .btn-primary:hover {
            background-color: #2b6cb0;
            border-color: #2c5282;
        }
        
        .btn-download {
            background-color: #38a169;
            border-color: #2f855a;
            color: white;
        }
        
        .btn-download:hover {
            background-color: #2f855a;
            border-color: #276749;
            color: white;
        }
        
        .processing-spinner {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        
        #status-message {
            display: none;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            background-color: #3182ce;
            color: white;
        }
        
        .text-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <h1 class="mb-4">Anymize - Processing Result</h1>
        
        <div id="status-message" class="alert alert-info">
            <div class="spinner-border processing-spinner" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <span>Warte auf Anonymisierung des Textes...</span>
        </div>
        
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"></h5>
                <a href="{{ url_for('index') }}" class="btn btn-primary">New Upload</a>
            </div>
            <div class="card-body">
                <div class="row">
                    <!-- Extracted Original Text -->
                    <div class="col-md-6">
                        <div class="text-header">
                            <h5>Extracted Text:</h5>
                            <button class="btn btn-download" id="download-original">
                                <i class="fas fa-file-pdf"></i> Download as PDF
                            </button>
                        </div>
                        <div class="text-container" style="height: 500px; overflow-y: auto; overflow-x: hidden;">
                            <pre id="input-text">{{ input_text }}</pre>
                        </div>
                    </div>
                    
                    <!-- Processed Text (Anonymized) -->
                    <div class="col-md-6">
                        <div class="text-header">
                            <h5>Processed Text:</h5>
                            <button class="btn btn-download" id="download-anonymized">
                                <i class="fas fa-file-pdf"></i> Download as PDF
                            </button>
                        </div>
                        <div class="text-container" style="height: 500px; overflow-y: auto; overflow-x: hidden;">
                            <pre id="output-text">{{ output_text }}</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        const isProcessing = {{ 'true' if processing else 'false' }};
        {% raw %}
        document.addEventListener('DOMContentLoaded', function() {
            const outputTextElement = document.getElementById('output-text');
            const inputTextElement = document.getElementById('input-text');
            const statusMessage = document.getElementById('status-message');
            const downloadOriginalBtn = document.getElementById('download-original');
            const downloadAnonymizedBtn = document.getElementById('download-anonymized');

            // PDF-Vorlage und Anhang für anonymisierte Dokumente
            const anonymizedHeader = `Hinweis zur Struktur dieses Dokuments:\n\nAlle sensiblen Daten in diesem Text wurden anonymisiert. Die ersetzten Inhalte erscheinen in der Form {%{PRÄFIX-HASH}%}, z.\u202F B. {%{FN-123abc}%}. Diese Platzhalter stehen für die ursprünglichen, schützenswerten Daten wie Namen, Adressen, Firmen o.\u202FÄ. und ermöglichen es, den Text semantisch zu interpretieren, ohne Rückschlüsse auf konkrete Personen zuzulassen.`;
            const anonymizedFooter = `Anhang – Erläuterung der Platzhalter\n\nIn diesem Dokument wurden sensible Inhalte durch Platzhalter im Format {%{PRÄFIX-HASH}%} ersetzt, z.\u202F B. {%{FN-62736}%}.\nDiese Platzhalter stehen für die ursprünglichen Originaldaten und dienen ausschließlich der datenschutzkonformen Verarbeitung.\n\nDie verwendeten Präfixe haben folgende Bedeutung:\n\nFN – First Name (Vorname)\nLN – Last Name (Nachname)\nMN – Middle Name (zweiter Vorname)\nADS – Adress Street (Straßenname)\nADB – Adress Building (Hausnummer, Wohnungsangabe etc.)\nDOB – Date of Birth (Geburtsdatum)\nTEL – Telephone Number (Telefonnummer)\nEMA – Email Address (E-Mail-Adresse)\nSSN – Social Security Number (Sozialversicherungsnummer)\nPAS – Passport Number (Reisepassnummer)\nDLN – Driver's License Number (Führerscheinnummer)\nHIN – Health Insurance Number (Krankenversicherungsnummer)\nIP – IP Address (IP-Adresse)\nWEB – Personal Website (persönliche Webseite)\nCN – Company Name (Firmen-/Kanzleiname)\nBN – Bank Number (Bankverbindung)\nID – ID Number (Identifikationsnummer)\nUP – Unknown Prefix (nicht eindeutig zuordenbare Information)\n\nHinweis: Die Platzhalter sind als reale Werte zu interpretieren – jedoch ohne Möglichkeit zur Rückverfolgung oder Entschlüsselung.`;

            // Show status if still processing and start polling
            if (isProcessing) {
                statusMessage.style.display = 'block';
                pollForResults();
            }

            // PDF download für Originaltext (ohne Zusatz)
            downloadOriginalBtn.addEventListener('click', function() {
                const text = inputTextElement.textContent;
                generatePDF(text, 'original_text.pdf', false);
            });

            // PDF download für anonymisierten Text (mit Zusatz)
            downloadAnonymizedBtn.addEventListener('click', function() {
                const text = outputTextElement.textContent;
                generatePDF(text, 'anonymized_text.pdf', true);
            });

            // Improved PDF generation with proper formatting
            function generatePDF(text, filename, withHeaderFooter) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const margin = 15;
                const maxWidth = pageWidth - 2 * margin;
                
                // Starting position
                let y = margin;
                
                if (withHeaderFooter) {
                    // --- HEADER SECTION ---
                    doc.setFont('times', 'normal');
                    doc.setFontSize(11);
                    doc.setTextColor(255, 0, 0); // Red
                    
                    // Add header title
                    doc.text("Hinweis zur Struktur dieses Dokuments:", margin, y);
                    y += 7;
                    
                    // Add paragraph with proper wrapping
                    const headerParagraph = "Alle sensiblen Daten in diesem Text wurden anonymisiert. Die ersetzten " +
                        "Inhalte erscheinen in der Form {%{PRÄFIX-HASH}%}, z. B. {%{FN-123abc}%}. Diese Platzhalter " +
                        "stehen für die ursprünglichen, schützenswerten Daten wie Namen, Adressen, Firmen o. Ä. und " +
                        "ermöglichen es, den Text semantisch zu interpretieren, ohne Rückschlüsse auf konkrete Personen zuzulassen.";
                    
                    const headerLines = doc.splitTextToSize(headerParagraph, maxWidth);
                    doc.text(headerLines, margin, y);
                    y += headerLines.length * 6 + 15; // Add extra space after header
                    
                    // --- CONTENT SECTION ---
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(11);
                    doc.setTextColor(0, 0, 0); // Black
                    
                    const contentLines = doc.splitTextToSize(text, maxWidth);
                    
                    // Draw content with pagination
                    for (let i = 0; i < contentLines.length; i++) {
                        if (y > doc.internal.pageSize.getHeight() - 25) {
                            doc.addPage();
                            y = margin;
                        }
                        doc.text(contentLines[i], margin, y);
                        y += 6;
                    }
                    
                    // --- FOOTER SECTION ---
                    y += 15; // Space before footer
                    
                    // Check if we need a new page for footer
                    if (y > doc.internal.pageSize.getHeight() - 120) {
                        doc.addPage();
                        y = margin;
                    }
                    
                    // Footer styling
                    doc.setFont('times', 'normal');
                    doc.setFontSize(11);
                    doc.setTextColor(255, 0, 0); // Red
                    
                    // Add footer title
                    doc.text("Anhang – Erläuterung der Platzhalter", margin, y);
                    y += 7;
                    
                    // Footer content with each prefix on a new line
                    const footerIntro = "In diesem Dokument wurden sensible Inhalte durch Platzhalter im Format {%{PRÄFIX-HASH}%} " +
                        "ersetzt, z. B. {%{FN-62736}%}. Diese Platzhalter stehen für die ursprünglichen Originaldaten " +
                        "und dienen ausschließlich der datenschutzkonformen Verarbeitung.";
                    
                    const footerIntroLines = doc.splitTextToSize(footerIntro, maxWidth);
                    doc.text(footerIntroLines, margin, y);
                    y += footerIntroLines.length * 6 + 7;
                    
                    // Add prefix title
                    doc.text("Die verwendeten Präfixe haben folgende Bedeutung:", margin, y);
                    y += 7;
                    
                    // Add each prefix on its own line with consistent formatting
                    const prefixes = [
                        "FN – First Name (Vorname)",
                        "LN – Last Name (Nachname)",
                        "MN – Middle Name (zweiter Vorname)",
                        "ADS – Adress Street (Straßenname)",
                        "ADB – Adress Building (Hausnummer, Wohnungsangabe etc.)",
                        "DOB – Date of Birth (Geburtsdatum)",
                        "TEL – Telephone Number (Telefonnummer)",
                        "EMA – Email Address (E-Mail-Adresse)",
                        "SSN – Social Security Number (Sozialversicherungsnummer)",
                        "PAS – Passport Number (Reisepassnummer)",
                        "DLN – Driver's License Number (Führerscheinnummer)",
                        "HIN – Health Insurance Number (Krankenversicherungsnummer)",
                        "IP – IP Address (IP-Adresse)",
                        "WEB – Personal Website (persönliche Webseite)",
                        "CN – Company Name (Firmen-/Kanzleiname)",
                        "BN – Bank Number (Bankverbindung)",
                        "ID – ID Number (Identifikationsnummer)",
                        "UP – Unknown Prefix (nicht eindeutig zuordenbare Information)"
                    ];
                    
                    for (let i = 0; i < prefixes.length; i++) {
                        if (y > doc.internal.pageSize.getHeight() - 15) {
                            doc.addPage();
                            y = margin;
                        }
                        doc.text(prefixes[i], margin, y);
                        y += 6;
                    }
                    
                    // Add footer note
                    y += 7;
                    const footerNote = "Hinweis: Die Platzhalter sind als reale Werte zu interpretieren – jedoch ohne " +
                        "Möglichkeit zur Rückverfolgung oder Entschlüsselung.";
                    
                    const footerNoteLines = doc.splitTextToSize(footerNote, maxWidth);
                    doc.text(footerNoteLines, margin, y);
                } else {
                    // Just text without header/footer (for original text)
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(11);
                    
                    const lines = doc.splitTextToSize(text, maxWidth);
                    for (let i = 0; i < lines.length; i++) {
                        if (y > doc.internal.pageSize.getHeight() - 25) {
                            doc.addPage();
                            y = margin;
                        }
                        doc.text(lines[i], margin, y);
                        y += 6;
                    }
                }

                doc.save(filename);
            }

            // AJAX polling for results with better job_id extraction
            function pollForResults() {
                // Get job_id from URL or hidden field
                const urlParams = new URLSearchParams(window.location.search);
                let jobId = urlParams.get('job_id');
                const jobIdElem = document.getElementById('job-id');
                
                if (!jobId && jobIdElem) {
                    jobId = jobIdElem.value;
                }
                
                // If no job_id in URL or element, try to get from session via API
                function checkStatus() {
                    console.log('Polling for results...');
                    fetch('/result_ajax' + (jobId ? `?job_id=${jobId}` : ''))
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP error ${response.status}`);
                            }
                            return response.json();
                        })
                        .then(data => {
                            console.log('Result data:', data);
                            if (data.status === 'done') {
                                // Hide status message
                                statusMessage.style.display = 'none';
                                
                                // Update input and output text
                                if (data.input_text && inputTextElement) {
                                    inputTextElement.textContent = data.input_text;
                                }
                                if (data.output_text && outputTextElement) {
                                    outputTextElement.textContent = data.output_text;
                                    // Enable download buttons
                                    if (downloadOriginalBtn) downloadOriginalBtn.disabled = false;
                                    if (downloadAnonymizedBtn) downloadAnonymizedBtn.disabled = false;
                                }
                            } else if (data.status === 'processing') {
                                // Keep polling if still processing
                                setTimeout(checkStatus, 3000);
                            }
                        })
                        .catch(error => {
                            console.error('Error polling for results:', error);
                            setTimeout(checkStatus, 5000); // Retry with longer delay on error
                        });
                }
                
                // Start polling
                checkStatus();
            }
        });
        {% endraw %}
    </script>
</body>
</html>
